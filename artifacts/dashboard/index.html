<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ReservaAI</title>
    <meta name="description" content="Sistema de agendamentos automáticos com WhatsApp para empresas." />
    <meta name="robots" content="index, follow" />

    <!-- ── PWA Manifest ──────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Theme color ───────────────────────────────────────────────── -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- ── Apple / iOS PWA ──────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ReservaAI" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- ── Apple Splash Screens ─────────────────────────────────────── -->
    <!-- iPhone SE / 8 (750×1334 @2x) -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-750x1334.png" />
    <!-- iPhone 12 / 13 / 14 (1170×2532 @3x) -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1170x2532.png" />
    <!-- iPhone 13 Pro Max / 14 Plus (1284×2778 @3x) -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1290x2796.png" />
    <!-- iPhone 14 Pro / 15 / 15 Pro (1179×2556 @3x) -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1170x2532.png" />
    <!-- iPhone 14 Pro Max / 15 Plus / 15 Pro Max (1290×2796 @3x) -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/icons/splash-1290x2796.png" />
    <!-- iPad (1536×2048 @2x) -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-2048x2732.png" />
    <!-- iPad Pro 12.9" (2048×2732 @2x) -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/icons/splash-2048x2732.png" />

    <!-- ── Favicons ──────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="shortcut icon" href="/favicon.svg" />

    <!-- ── Microsoft / Windows ──────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
    <meta name="application-name" content="ReservaAI" />

    <!-- ── Open Graph / Social ──────────────────────────────────────── -->
    <meta property="og:site_name" content="ReservaAI" />
    <meta property="og:title" content="ReservaAI — Mais agendamentos. Mais clientes." />
    <meta property="og:description" content="Automatize agendamentos, confirmações e atendimento via WhatsApp." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://admin-password.replit.app/" />
    <meta property="og:image" content="https://admin-password.replit.app/opengraph.jpg" />
    <meta property="og:image:secure_url" content="https://admin-password.replit.app/opengraph.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ReservaAI — Agendamentos automáticos com WhatsApp" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@reservaai" />
    <meta name="twitter:title" content="ReservaAI — Mais agendamentos. Mais clientes." />
    <meta name="twitter:description" content="Automatize agendamentos, confirmações e atendimento via WhatsApp." />
    <meta name="twitter:image" content="https://admin-password.replit.app/opengraph.jpg" />
    <meta name="twitter:image:alt" content="ReservaAI — Agendamentos automáticos com WhatsApp" />

    <!-- ── Fonts ─────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ── Inline critical styles ───────────────────────────────────── -->
    <style>
      html { background-color: #ffffff; overflow-x: hidden; max-width: 100%; }
      body { background-color: transparent; margin: 0; overflow-x: hidden; max-width: 100%; position: relative; }
      *, *::before, *::after { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
